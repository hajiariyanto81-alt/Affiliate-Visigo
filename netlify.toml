[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/submit-affiliate"
  to = "/.netlify/functions/submit-affiliate"
  status = 200
  force = true

[[redirects]]
  from = "/api/cek-saldo"
  to = "/.netlify/functions/cek-saldo"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
