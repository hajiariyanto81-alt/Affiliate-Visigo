<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>AFFILIATE VISIGO</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co.com/XxC5vKqD/VISIGO-LOGO.png" />
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        console.error('Window Error:', msg, url, lineNo, columnNo, error);
        // If the app doesn't load within 5 seconds, it might be a script load error
        setTimeout(function() {
          if (!window.__REACT_HYDRATED__) {
            console.warn('App not hydrated, might need reload');
          }
        }, 5000);
        return false;
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
